version: "3.9"

services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/patrickxchen/vswrite-frontend:latest}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app-net

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/patrickxchen/vswrite-backend:latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATA_STORE=${DATA_STORE:-memory}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
    expose:
      - "4000"
    depends_on:
      - postgres
      - redis
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-net

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - app-net

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - app-net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-vswrite}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-net

volumes:
  postgres-data:

networks:
  app-net:
    driver: bridge