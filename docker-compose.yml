version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_URL=/api
    expose:
      - "80"
    networks:
      - app-net

  backend:
    build:
      context: ./backend
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATA_STORE=${DATA_STORE:-memory}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/vswrite?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    expose:
      - "4000"
    depends_on:
      - postgres
      - redis
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-net

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - app-net

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - app-net

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vswrite
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-net

volumes:
  postgres-data:

networks:
  app-net:
    driver: bridge
