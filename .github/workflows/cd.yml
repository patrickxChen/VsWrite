name: CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/vswrite-frontend:latest ./frontend
          docker push ghcr.io/${{ github.repository_owner }}/vswrite-frontend:latest

      - name: Build and push backend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/vswrite-backend:latest ./backend
          docker push ghcr.io/${{ github.repository_owner }}/vswrite-backend:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/vswrite
            docker compose pull
            docker compose up -d
