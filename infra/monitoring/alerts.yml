groups:
  - name: vswrite-backend-alerts
    rules:
      - alert: VsWriteBackendDown
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "VsWrite backend is down"
          description: "Prometheus cannot scrape the backend for more than 2 minutes."

      - alert: VsWriteHighP95Latency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.30
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "VsWrite backend high P95 latency"
          description: "P95 latency is above 300ms for 10 minutes."

      - alert: VsWriteHigh5xxErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 0.001) > 0.05
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "VsWrite backend high 5xx error ratio"
          description: "5xx ratio is above 5% for 5 minutes."

      - alert: VsWriteNoSessionTraffic
        expr: sum(rate(http_requests_total{route=~"/sessions.*"}[15m])) == 0
        for: 20m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "No session traffic observed"
          description: "No session API traffic observed for 20 minutes. Validate ingestion path if this is unexpected."
