version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - app-net

  backend:
    build:
      context: ./backend
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATA_STORE=memory
      - CORS_ORIGIN=http://localhost
    expose:
      - "4000"
    restart: unless-stopped
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge